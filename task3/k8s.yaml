apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2 # Запустимо 2 копії для надійності
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: flask-app
        image: danyloshram/my-python-app:latest
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080 # Додаток буде доступний на цьому порті