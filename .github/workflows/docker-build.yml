name: "Task 3: Docker Build & Push"

on:
  push:
    paths:
      - 'task3/**' # Працює тільки коли міняємо файли додатка

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: "Забираю код"
        uses: actions/checkout@v4

      - name: "Логінюсь у Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Збираю образ і відправляю на склад"
        uses: docker/build-push-action@v5
        with:
          context: ./task3
          push: true
          tags: danyloshram/my-python-app:latest